<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #030303;
            --card: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --glitch-1: #ff0000;
            --glitch-2: #00ffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .container {
            width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            transition: 0.4s ease-in-out;
        }

        .container:hover {
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        .banner {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%) brightness(50%);
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .container:hover .banner img {
            filter: grayscale(0%) contrast(110%) brightness(70%);
            transform: scale(1.1);
        }

        .profile-wrapper {
            position: relative;
            padding: 0 25px;
            margin-top: -60px;
            z-index: 10;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--card);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 25px 25px 40px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--accent);
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
        }

        .asta-text {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .container:hover .asta-text {
            color: #fff;
            letter-spacing: 6px;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            box-shadow: 0 0 15px #fff;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--glitch-1), -2px 0 var(--glitch-2); }
            25% { text-shadow: -2px 0 var(--glitch-1), 2px 0 var(--glitch-2); }
            50% { text-shadow: 2px -1px var(--glitch-1), -2px 1px var(--glitch-2); }
            100% { text-shadow: 0 0 var(--glitch-1), 0 0 var(--glitch-2); }
        }

        .container:hover h1 {
            animation: glitch 0.3s linear infinite;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 20;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="container">
        <div class="scanline"></div>
        <div class="banner">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
        </div>

        <div class="profile-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="info">
            <h1>SINWRLDD</h1>
            <div class="asta-text">ASTA LA VISTA (67)</div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });
    </script>
</body>
</html>
