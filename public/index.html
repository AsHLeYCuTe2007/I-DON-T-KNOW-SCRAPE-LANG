<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD | UNTOUCHABLE</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-black: #080808;
            --accent: #ffffff;
            --muted: #444444;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-black);
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .main-container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 800px;
            background: var(--card-black);
            border: 1px solid var(--muted);
            position: relative;
            animation: fadeIn 1.2s ease-out;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        .cover-gif {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%);
            border-bottom: 1px solid var(--muted);
        }

        .profile-content {
            padding: 0 40px 40px 40px;
            flex-grow: 1;
            background: linear-gradient(to bottom, #080808, #000000);
        }

        .avatar-box {
            width: 130px;
            height: 130px;
            margin-top: -65px;
            margin-bottom: 25px;
            position: relative;
            border: 4px solid var(--card-black);
            background: var(--card-black);
        }

        .avatar-gif {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) brightness(80%);
            border: 1px solid var(--muted);
        }

        .name-header {
            margin-bottom: 30px;
        }

        .name {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
        }

        .status {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            display: block;
            margin-top: 5px;
        }

        .bio-section {
            border-left: 2px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 40px;
        }

        .bio-text {
            font-size: 16px;
            line-height: 1.6;
            color: #888;
            font-style: italic;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            text-decoration: none;
            color: var(--accent);
            font-size: 14px;
            font-weight: bold;
            padding: 15px;
            border: 1px solid var(--muted);
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .link-btn:hover {
            background: var(--accent);
            color: var(--bg-black);
            letter-spacing: 8px;
        }

        .overlay-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="overlay-effect"></div>
        <img src="https://i.gifer.com/ITeI.gif" class="cover-gif" alt="cover">
        
        <div class="profile-content">
            <div class="avatar-box">
                <img src="https://i.gifer.com/7oOz.gif" class="avatar-gif" alt="pfp">
            </div>

            <div class="name-header">
                <h1 class="name">sinwrldd</h1>
                <span class="status">Disconnected // Limited Edition</span>
            </div>

            <div class="bio-section">
                <p class="bio-text">"Respect is earned. Loyalty is returned. Betrayal is learned."</p>
            </div>

            <div class="links">
                <a href="#" class="link-btn">Enter Void</a>
                <a href="#" class="link-btn">Archives</a>
            </div>
        </div>
    </div>

</body>
</html>
