<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 450px;
            background: var(--card);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .banner {
            width: 100%;
            height: 180px;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(50%);
            transition: 1s ease;
        }

        .container:hover .banner img {
            filter: grayscale(0%) brightness(70%);
            transform: scale(1.1);
        }

        .profile-wrapper {
            position: relative;
            padding: 0 30px;
            margin-top: -60px;
            display: flex;
            z-index: 5;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--card);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 25px 30px 45px;
            text-align: left;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 38px;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #fff, #333);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }

        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(3deg); }
            40% { transform: skew(-3deg); }
            60% { transform: skew(1deg); }
            100% { transform: skew(0deg); }
        }

        .container:hover h1 {
            animation: glitch 0.4s linear infinite;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="container">
        <div class="banner">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
        </div>

        <div class="profile-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="info">
            <h1>sinwrldd</h1>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 5 + 'px';
            cursor.style.top = e.clientY - 5 + 'px';
        });
    </script>
</body>
</html>
