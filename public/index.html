<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #050505;
            --card: #0d0d0d;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --glitch-1: #ff003c;
            --glitch-2: #00f2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #151515 0%, #000 100%);
        }

        .container {
            width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border 0.3s ease;
            overflow: hidden;
        }

        .container:hover {
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-10px) scale(1.02);
        }

        .banner {
            width: 100%;
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(40%);
            transition: 1.5s ease;
        }

        .container:hover .banner img {
            filter: grayscale(30%) brightness(60%);
            transform: scale(1.1);
        }

        .profile-section {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            z-index: 10;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--card);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background: #000;
            transition: 0.5s ease;
        }

        .container:hover .avatar {
            border-color: rgba(255,255,255,0.1);
            transform: rotate(5deg);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 20px 30px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--accent);
            margin-top: 15px;
            position: relative;
            display: inline-block;
        }

        .asta-text {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #555;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            transition: 0.4s ease;
        }

        .container:hover .asta-text {
            color: #aaa;
            letter-spacing: 8px;
        }

        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--glitch-1), -2px 0 var(--glitch-2); }
            25% { text-shadow: -2px 0 var(--glitch-1), 2px 0 var(--glitch-2); }
            50% { text-shadow: 2px -1px var(--glitch-1), -2px 1px var(--glitch-2); }
            100% { text-shadow: 0 0 var(--glitch-1), 0 0 var(--glitch-2); }
        }

        .container:hover h1 {
            animation: glitch 0.4s skew linear infinite;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(255, 255, 255, 0.02) 50%
            );
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="container">
        <div class="scanline"></div>
        <div class="banner">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
        </div>

        <div class="profile-section">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
            
            <div class="info">
                <h1>SINWRLDD</h1>
                <div class="asta-text">ASTA LA VISTA (67)</div>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => cursor.style.transform = 'scale(2)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');
    </script>
</body>
</html>
