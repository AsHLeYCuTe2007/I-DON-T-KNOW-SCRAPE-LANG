<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINWRLDD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap');
        :root {
            --bg: #000;
            --accent: #ffcc00; 
            --accent-secondary: #00f2ff;
            --verify-blue: #0095f6;
            --text-white: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
            outline: none;
        }
        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Syncopate', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #security-alert {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            border: 4px solid var(--accent);
        }
        #security-alert h1 {
            color: var(--text-white);
            font-size: 24px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--accent);
            margin-bottom: 15px;
        }
        .profile-card {
            width: 100%;
            max-width: 480px;
            background: #000;
            position: relative;
            min-height: 100vh;
            border-left: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
        }
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.01) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }
        .banner-container {
            width: 100%;
            height: 160px; 
            position: relative;
            overflow: hidden;
        }
        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.3);
        }
        .accent-line {
            height: 2px;
            width: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-secondary), transparent);
            position: absolute;
            bottom: 0;
            z-index: 5;
            box-shadow: 0 0 15px var(--accent);
            animation: lineFlow 3s infinite linear;
            background-size: 200% 100%;
        }
        @keyframes lineFlow {
            0% { background-position: 100% 0%; }
            100% { background-position: -100% 0%; }
        }
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -60px;
            position: relative;
            z-index: 10;
        }
        .avatar {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px;
            background: #000;
            box-shadow: 0 15px 50px rgba(0,0,0,1);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%);
        }
        .content {
            padding: 40px 20px;
            text-align: center;
        }
        .username {
            font-size: 24px;
            letter-spacing: -1px;
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }
        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background-color: var(--verify-blue);
            border-radius: 50%;
        }
        .verified-badge svg {
            width: 11px;
            height: 11px;
            fill: white;
        }
        .sub-text {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #777;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
        }
        .social-links {
            margin-top: 40px;
        }
        .fb-btn {
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-white);
            padding: 12px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            letter-spacing: 4px;
            transition: 0.4s;
        }
        .fb-btn:hover {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        .accent-divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-white), transparent);
            margin: 30px auto;
            opacity: 0.3;
        }
    </style>
</head>

        <div class="avatar-wrapper">
