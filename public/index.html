<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // UNTOUCHABLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono&display=swap');

        :root {
            --main-bg: #050505;
            --card-bg: rgba(10, 10, 10, 0.95);
            --accent: #ffffff;
            --dim: #555555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--main-bg);
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            overflow: hidden;
        }

        .wrapper {
            width: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wrapper:hover {
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 120px rgba(255,255,255,0.05);
        }

        .banner {
            width: 100%;
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(150%) brightness(70%);
            transition: 1s;
        }

        .wrapper:hover .banner img {
            filter: grayscale(0%) contrast(120%) brightness(80%);
            transform: scale(1.1);
        }

        .profile-container {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(50%);
        }

        .avatar-circle:hover {
            transform: rotate(-5deg) scale(1.1);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .content {
            padding: 80px 30px 40px;
            text-align: center;
        }

        .name-box h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 28px;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        .bio-box {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 4px;
            border-left: 2px solid #fff;
            margin-bottom: 30px;
            text-align: left;
        }

        .bio-box p {
            font-size: 13px;
            line-height: 1.6;
            color: #bbb;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 15px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .cursor-follower {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transition: transform 0.1s;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .glitch-text:hover {
            animation: glitch 0.3s linear infinite;
        }
    </style>
</head>
<body>

    <div class="cursor-follower" id="cursor"></div>

    <div class="wrapper">
        <div class="banner">
            <img src="https://i.gifer.com/ITeI.gif" alt="cover">
        </div>

        <div class="profile-container">
            <div class="avatar-circle">
                <img src="https://i.gifer.com/7oOz.gif" alt="pfp">
            </div>
        </div>

        <div class="content">
            <div class="name-box">
                <h1 class="glitch-text">sinwrldd</h1>
                <span class="tagline">Stay Silent // Stay Rich</span>
            </div>

            <div class="bio-box">
                <p>Authenticity is a rare currency. Moving through the world with zero noise and maximum impact. Dedicated to the craft.</p>
            </div>

            <div class="links">
                <a href="#" class="btn">View Archives</a>
                <a href="#" class="btn">Send Signal</a>
            </div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });
    </script>
</body>
</html>
