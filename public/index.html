<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #000000;
            --card-bg: #000000;
            --accent-red: #ff0000;
            --verify-blue: #0095f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Syncopate', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #050505 0%, #000 100%);
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            box-shadow: 0 0 15px #fff;
            transition: transform 0.1s ease;
        }

        .profile-card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            position: relative;
            min-height: 100vh;
            border-left: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.01) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        .banner-container {
            width: 100%;
            height: 150px; 
            position: relative;
            overflow: hidden;
            background: #050505;
        }

        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.3);
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .profile-card:hover .banner-container img {
            filter: grayscale(100%) brightness(0.5);
            transform: scale(1.1);
        }

        .red-line {
            height: 1px;
            width: 100%;
            background: var(--accent-red);
            position: absolute;
            bottom: 0;
            z-index: 5;
            box-shadow: 0 0 15px var(--accent-red);
            animation: linePulse 2s infinite ease-in-out;
        }

        @keyframes linePulse {
            0%, 100% { opacity: 0.4; box-shadow: 0 0 5px var(--accent-red); }
            50% { opacity: 1; box-shadow: 0 0 20px var(--accent-red); }
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -55px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3px;
            background: #000;
            box-shadow: 0 10px 50px rgba(0,0,0,1);
            transition: 0.4s ease;
        }

        .avatar:hover {
            border-color: var(--accent-red);
            transform: translateY(-5px);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
        }

        .content {
            padding: 40px 20px;
            text-align: center;
        }

        .username {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px;
            letter-spacing: -1px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .username span {
            color: var(--accent-red);
            animation: textGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 2px rgba(255,0,0,0.2); }
            to { text-shadow: 0 0 15px rgba(255,0,0,0.9); }
        }

        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background-color: var(--verify-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 149, 246, 0.3);
        }

        .verified-badge svg {
            width: 11px;
            height: 11px;
            fill: white;
        }

        .sub-text {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #444;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
        }

        .profile-card:hover .sub-text {
            color: #777;
            letter-spacing: 8px;
        }

        .accent-divider {
            width: 40px;
            height: 1px;
            background: var(--accent-red);
            margin: 30px auto;
            box-shadow: 0 0 10px var(--accent-red);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <audio id="bgMusic" loop>
        <source src="kurapika.mp3" type="audio/mpeg">
    </audio>

    <div class="profile-card">
        <div class="scanlines"></div>
        
        <div class="banner-container">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
            <div class="red-line"></div>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="content">
            <div class="username">
                SIN <span>WRLDD</span>
                <div class="verified-badge">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
            </div>
            
            <div class="sub-text">ASTA LA VISTA • 67</div>
            
            <div class="accent-divider"></div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const audio = document.getElementById("bgMusic");

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });

        function initAudio() {
            audio.play().then(() => {
                document.removeEventListener('click', initAudio);
                document.removeEventListener('touchstart', initAudio);
            }).catch(e => console.log(e));
        }

        document.addEventListener('click', initAudio);
        document.addEventListener('touchstart', initAudio);

        document.addEventListener('mousedown', () => cursor.style.transform = 'scale(2)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');
    </script>
</body>
</html>
