<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #000000;
            --card-bg: #000000;
            --accent-red: #ff0000;
            --accent-gold: #ffffff; 
            --text-muted: #555555;
            --verify-blue: #0095f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }

        .profile-card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            position: relative;
            min-height: 100vh;
            border-left: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .banner-container {
            width: 100%;
            height: 160px; 
            position: relative;
            overflow: hidden;
            background: #050505;
        }

        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.4) contrast(1.2);
            transition: 0.5s ease;
        }

        .profile-card:hover .banner-container img {
            filter: grayscale(100%) brightness(0.6);
        }

        .red-line {
            height: 1px;
            width: 100%;
            background: var(--accent-red);
            position: absolute;
            bottom: 0;
            z-index: 5;
            box-shadow: 0 0 15px var(--accent-red), 0 0 5px var(--accent-red);
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2px;
            background: #000;
            box-shadow: 0 10px 40px rgba(0,0,0,1);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            border-color: var(--accent-red);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
        }

        .content {
            padding: 25px 20px;
            text-align: center;
        }

        .username {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 2px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 2px;
        }

        .username span {
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background-color: var(--verify-blue);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(0, 149, 246, 0.4);
        }

        .verified-badge svg {
            width: 11px;
            height: 11px;
            fill: white;
        }

        .sub-text {
            font-size: 9px;
            color: #777;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 700;
        }

        .accent-divider {
            width: 30px;
            height: 1px;
            background: var(--accent-red);
            margin: 25px auto;
            box-shadow: 0 0 10px var(--accent-red);
            opacity: 0.8;
        }

        .footer-text {
            font-size: 9px;
            color: #333;
            letter-spacing: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .profile-card:hover .footer-text {
            color: #666;
            letter-spacing: 10px;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            box-shadow: 0 0 15px #fff;
        }

        .overlay-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(255,0,0,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="profile-card">
        <div class="overlay-glow"></div>
        
        <div class="banner-container">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
            <div class="red-line"></div>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="content">
            <div class="username">
                SIN <span>WRLDD</span>
                <div class="verified-badge">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
            </div>
            
            <div class="sub-text">ASTA LA VISTA • FULLSTACK</div>
            
            <div class="accent-divider"></div>
            
            <div class="footer-text">6 7 // G Ø D Z - M Ø D Z</div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });
    </script>
</body>
</html>
