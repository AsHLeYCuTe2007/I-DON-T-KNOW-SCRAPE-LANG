<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #000000;
            --card-bg: #050505;
            --accent-red: #e60000;
            --accent-gold: #d4af37;
            --text-muted: #666;
            --verify-blue: #0095f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Space Mono', monospace;
        }

        .profile-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            position: relative;
            min-height: 100vh;
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .banner-container {
            width: 100%;
            height: 220px;
            position: relative;
            overflow: hidden;
        }

        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7);
        }

        .red-line {
            height: 2px;
            width: 100%;
            background: var(--accent-red);
            position: absolute;
            bottom: 0;
            z-index: 5;
            box-shadow: 0 0 12px var(--accent-red);
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -65px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            padding: 4px;
            background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(20%);
        }

        .content {
            padding: 30px 20px;
            text-align: center;
        }

        .username {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .username span {
            color: var(--accent-red);
        }

        .verified-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-color: var(--verify-blue);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 149, 246, 0.4);
        }

        .verified-badge svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        .sub-text {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 700;
        }

        .accent-divider {
            width: 35px;
            height: 2px;
            background: var(--accent-red);
            margin: 25px auto;
            box-shadow: 0 0 10px var(--accent-red);
        }

        .footer-text {
            font-size: 9px;
            color: #444;
            letter-spacing: 6px;
            font-weight: bold;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="profile-card">
        <div class="banner-container">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
            <div class="red-line"></div>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="content">
            <div class="username">
                SIN <span>WRLDD</span>
                <div class="verified-badge">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
            </div>
            
            <div class="sub-text">ASTA LA VISTA • FULLSTACK</div>
            
            <div class="accent-divider"></div>
            
            <div class="footer-text">6 7 // G Ø D Z - M Ø D Z</div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });
    </script>
</body>
</html>
