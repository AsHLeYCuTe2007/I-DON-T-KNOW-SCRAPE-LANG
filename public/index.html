<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINWRLDD // 67</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --accent-red: #ff0000;
            --accent-gold: #ffcc00;
            --text-gray: #888;
            --border-rgba: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Mono', monospace;
            background-image: 
                radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        .profile-card {
            width: 380px;
            background: var(--card-bg);
            border: 1px solid var(--border-rgba);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border-radius: 4px;
            overflow: hidden;
            transition: 0.4s ease;
        }

        .profile-card:hover {
            border-color: rgba(255, 0, 0, 0.3);
            transform: translateY(-5px);
        }

        .banner-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: #111;
            overflow: hidden;
        }

        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%) brightness(0.6);
            transition: 0.8s ease;
        }

        .profile-card:hover .banner-container img {
            filter: grayscale(0%) brightness(0.7);
            transform: scale(1.05);
        }

        .red-line {
            height: 2px;
            width: 100%;
            background: var(--accent-red);
            position: absolute;
            bottom: 0;
            z-index: 5;
            box-shadow: 0 0 15px var(--accent-red);
        }

        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -55px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
            padding: 3px;
            background: var(--card-bg);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .content {
            padding: 25px 20px 40px;
            text-align: center;
        }

        .username {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 2px;
            color: var(--accent-gold);
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .username span {
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .badge {
            width: 18px;
            height: 18px;
            background: #3498db;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.6);
        }

        .sub-text {
            font-size: 9px;
            color: var(--text-gray);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--accent-red);
            margin: 20px auto;
        }

        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            box-shadow: 0 0 10px #fff;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%
            );
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="profile-card">
        <div class="scanlines"></div>
        
        <div class="banner-container">
            <img src="https://i.gifer.com/VhAL.gif" alt="cover">
            <div class="red-line"></div>
        </div>

        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="https://i.gifer.com/8pav.gif" alt="pfp">
            </div>
        </div>

        <div class="content">
            <div class="username">
                SIN<span>WRLDD</span>
                <div class="badge">✓</div>
            </div>
            
            <div class="sub-text">ASTA LA VISTA • FULLSTACK</div>
            
            <div class="divider"></div>
            
            <div class="sub-text" style="color: #444; letter-spacing: 5px;">67 // GØDZ-MØDZ</div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });
    </script>
</body>
</html>
